<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Learning Smart App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --info: #1e90ff;
            --warning: #ffa502;
            --purple: #9b59b6;
            --dark: #2f3542;
            --bg: #f1f2f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', cursive, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Tabs */
        .sidebar {
            width: 260px;
            background-color: var(--dark);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 24px;
            color: var(--warning);
            margin-bottom: 20px;
            border-bottom: 3px dashed rgba(255,255,255,0.2);
            padding-bottom: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #ced6e0;
            padding: 14px 15px;
            text-align: left;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--primary);
            color: white;
            transform: scale(1.05);
        }

        /* Main Content Container */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .app-section {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .app-section.active {
            display: block;
        }

        h2.section-title {
            font-size: 28px;
            color: var(--dark);
            margin-bottom: 25px;
            text-align: center;
            border-bottom: 4px solid var(--info);
            padding-bottom: 10px;
            display: block;
        }

        /* Grid Item Box Style (A-Z, 1-100, Tables) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1max));
            gap: 15px;
            justify-content: center;
        }

        .kids-card {
            background: white;
            border: 3px solid #f1f2f6;
            border-radius: 15px;
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        .kids-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .card-big { font-size: 36px; font-weight: bold; margin-bottom: 5px; }
        .card-small { font-size: 14px; color: #57606f; font-weight: bold; }

        /* Color Variations for Fun Look */
        .c-1 { border-color: var(--primary); color: var(--primary); }
        .c-2 { border-color: var(--secondary); color: var(--secondary); }
        .c-3 { border-color: var(--info); color: var(--info); }
        .c-4 { border-color: var(--warning); color: var(--warning); }
        .c-5 { border-color: var(--purple); color: var(--purple); }

        /* Math Demo Styling */
        .math-box {
            max-width: 500px;
            margin: 0 auto;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--purple);
            text-align: center;
        }

        .math-question {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--dark);
            letter-spacing: 5px;
        }

        .math-input {
            width: 150px;
            padding: 10px;
            font-size: 28px;
            text-align: center;
            border: 3px solid #ccc;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .btn-check {
            background-color: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-check:hover { background-color: #21b358; }
        
        .math-feedback {
            margin-top: 15px;
            font-size: 22px;
            font-weight: bold;
            min-height: 30px;
        }

        /* Mobile View Response */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-solid fa-graduation-cap"></i> बालवाडी App</h2>
        <button class="nav-btn active" onclick="switchSection('sec-az')"><i class="fa-solid fa-font"></i> A to Z Words</button>
        <button class="nav-btn" onclick="switchSection('sec-num')"><i class="fa-solid fa-arrow-1-9"></i> 1 to 100 Numbers</button>
        <button class="nav-btn" onclick="switchSection('sec-tables')"><i class="fa-solid fa-table"></i> पाढे (Tables)</button>
        <button class="nav-btn" onclick="switchSection('sec-math')"><i class="fa-solid fa-plus-minus"></i> गणित Demo</button>
    </div>

    <div class="main-content">

        <div id="sec-az" class="app-section active">
            <h2 class="section-title">A to Z Alphabets & Words (क्लिक करा व आवाज ऐका)</h2>
            <div class="grid-container" id="az-container"></div>
        </div>

        <div id="sec-num" class="app-section">
            <h2 class="section-title">1 to 100 Numbers (अंक मोजा)</h2>
            <div class="grid-container" id="num-container"></div>
        </div>

        <div id="sec-tables" class="app-section">
            <h2 class="section-title">पाढे / गुणाकार मालिका (Multiplication Tables)</h2>
            <div class="grid-container" id="tables-container"></div>
        </div>

        <div id="sec-math" class="app-section">
            <h2 class="section-title">सोपे गणित सोडवा (Math Demo)</h2>
            <div class="math-box">
                <div class="math-question" id="math-q">5 + 3 = ?</div>
                <input type="number" id="math-ans" class="math-input" placeholder="उत्तर लिहा">
                <br>
                <button class="btn-check" onclick="checkMathAnswer()">उत्तर तपासा</button>
                <div id="math-msg" class="math-feedback"></div>
            </div>
        </div>

    </div>

    <script>
        // Data Arrays
        const azData = [
            {letter:'A', word:'Apple'}, {letter:'B', word:'Ball'}, {letter:'C', word:'Cat'}, {letter:'D', word:'Dog'},
            {letter:'E', word:'Elephant'}, {letter:'F', word:'Fish'}, {letter:'G', word:'Grapes'}, {letter:'H', word:'Horse'},
            {letter:'I', word:'Ice-cream'}, {letter:'J', word:'Jug'}, {letter:'K', word:'Kite'}, {letter:'L', word:'Lion'},
            {letter:'M', word:'Monkey'}, {letter:'N', word:'Nest'}, {letter:'O', word:'Orange'}, {letter:'P', word:'Parrot'},
            {letter:'Q', word:'Queen'}, {letter:'R', word:'Rabbit'}, {letter:'S', word:'Sun'}, {letter:'T', word:'Tiger'},
            {letter:'U', word:'Umbrella'}, {letter:'V', word:'Van'}, {letter:'W', word:'Watch'}, {letter:'X', word:'Xylophone'},
            {letter:'Y', word:'Yacht'}, {letter:'Z', word:'Zebra'}
        ];

        // Global Voice Function
        function speak(text, lang = 'en-US') {
            window.speechSynthesis.cancel(); // जुना आवाज थांबवण्यासाठी
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;
            utterance.rate = 0.85; // मुलांसाठी थोडा हळू आवाज
            window.speechSynthesis.speak(utterance);
        }

        // Section Changer Switch
        function switchSection(id) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            if(id === 'sec-math') generateMathQuestion();
        }

        // Render A to Z Elements
        const azContainer = document.getElementById('az-container');
        azData.forEach((item, index) => {
            let colorClass = `c-${(index % 5) + 1}`;
            azContainer.innerHTML += `
                <div class="kids-card ${colorClass}" onclick="speak('${item.letter} for ${item.word}')">
                    <div class="card-big">${item.letter}</div>
                    <div class="card-small">${item.word}</div>
                </div>`;
        });

        // Render 1 to 100 Numbers Elements
        const numContainer = document.getElementById('num-container');
        for(let i=1; i<=100; i++) {
            let colorClass = `c-${(i % 5) + 1}`;
            numContainer.innerHTML += `
                <div class="kids-card ${colorClass}" onclick="speak('${i}')">
                    <div class="card-big" style="padding: 10px 0;">${i}</div>
                </div>`;
        }

        // Render Multiples / Tables (2,4,6... 100 पर्यंत महत्वाचे पाढे)
        const tablesContainer = document.getElementById('tables-container');
        let tableNumbers = [2, 3, 4, 5, 6, 7, 8, 9, 10];
        tableNumbers.forEach((num, index) => {
            let colorClass = `c-${(index % 5) + 1}`;
            let seriesText = `${num}, ${num*2}, ${num*3}, ${num*4}, ${num*5}`;
            tablesContainer.innerHTML += `
                <div class="kids-card ${colorClass}" style="width: 100%; min-width: 130px;" onclick="speak('Table of ${num}: ${num}, ${num*2}, ${num*3}, ${num*4}, ${num*5}, ${num*6}, ${num*7}, ${num*8}, ${num*9}, ${num*10}')">
                    <div class="card-big" style="font-size:28px;">पाढा : ${num}</div>
                    <div class="card-small">${seriesText}...</div>
                </div>`;
        });

        // Math Game Engine Logic
        let currentCorrectAns = 0;
        function generateMathQuestion() {
            let num1 = Math.floor(Math.random() * 10) + 1;
            let num2 = Math.floor(Math.random() * 10) + 1;
            let types = ['+', '-'];
            let selectedType = types[Math.floor(Math.random() * types.length)];

            if (selectedType === '-') {
                if(num1 < num2) { let temp = num1; num1 = num2; num2 = temp; } // वजाबाकी उणे मध्ये येऊ नये म्हणून
                currentCorrectAns = num1 - num2;
            } else {
                currentCorrectAns = num1 + num2;
            }

            document.getElementById('math-q').innerText = `${num1} ${selectedType} ${num2} = ?`;
            document.getElementById('math-ans').value = '';
            document.getElementById('math-msg').innerText = '';
            speak(`Solve this math, ${num1} ${selectedType === '+' ? 'plus' : 'minus'} ${num2}`);
        }

        function checkMathAnswer() {
            let userAns = parseInt(document.getElementById('math-ans').value);
            let msgBox = document.getElementById('math-msg');

            if (isNaN(userAns)) {
                msgBox.style.color = "var(--warning)";
                msgBox.innerText = "कृपया पहिले उत्तर टाईप करा!";
                speak("Please write your answer");
                return;
            }

            if (userAns === currentCorrectAns) {
                msgBox.style.color = "var(--secondary)";
                msgBox.innerText = "🎉 खूप छान! बरोबर उत्तर आहे! 🌟";
                speak("Wow, Very Good! Correct Answer!");
                setTimeout(generateMathQuestion, 3000); // ३ सेकंदानंतर नवीन प्रश्न येईल
            } else {
                msgBox.style.color = "var(--primary)";
                msgBox.innerText = "❌ अरेरे! चुकीचे उत्तर, परत प्रयत्न कर.";
                speak("Oh no, Wrong answer, try again.");
            }
        }
    </script>
</body>
    </html>
