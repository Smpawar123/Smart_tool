<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tool - All Options Working</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: var(--primary-color);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 22px;
            letter-spacing: 1px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #b8c7ce;
            padding: 12px 15px;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--accent-color);
            color: white;
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .tool-section {
            display: none;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .tool-section.active {
            display: block;
        }

        h2.section-title {
            margin-bottom: 20px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 5px;
            display: inline-block;
        }

        /* Form & Component Controls */
        textarea, input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button.action-btn {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button.action-btn:hover {
            background-color: #2980b9;
        }

        .output-box {
            background: #eef2f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            min-height: 50px;
            white-space: pre-wrap;
            word-wrap: break-word;
            border-left: 5px solid var(--accent-color);
        }

        /* Responsive Layout */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <div class="sidebar">
        <h2><i class="fa-solid fa-screwdriver-wrench"></i> Smart Tool</h2>
        <button class="nav-btn active" onclick="switchTab('text-tool')"><i class="fa-solid fa-font"></i> Text Utility</button>
        <button class="nav-btn" onclick="switchTab('crypto-tool')"><i class="fa-solid fa-key"></i> Crypto (Base64)</button>
        <button class="nav-btn" onclick="switchTab('calc-tool')"><i class="fa-solid fa-calculator"></i> Smart Calc</button>
        <button class="nav-btn" onclick="switchTab('unit-tool')"><i class="fa-solid fa-ruler"></i> Unit Converter</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">

        <!-- 1. Text Utility Section -->
        <div id="text-tool" class="tool-section active">
            <h2 class="section-title">Text Utility Tool</h2>
            <label>तुमचा मजकूर (Text) इथे टाका:</label>
            <textarea id="text-input" rows="6" placeholder="इथे टाईप करा किंवा पेस्ट करा..."></textarea>
            <div class="btn-group">
                <button class="action-btn" onclick="processText('upper')">UPPERCASE</button>
                <button class="action-btn" onclick="processText('lower')">lowercase</button>
                <button class="action-btn" onclick="processText('count')">Count Words & Chars</button>
                <button class="action-btn" onclick="processText('clear')">Clear</button>
            </div>
            <div class="output-box" id="text-output">निकाल इथे दिसेल...</div>
        </div>

        <!-- 2. Crypto Section (Base64 Encode/Decode) -->
        <div id="crypto-tool" class="tool-section">
            <h2 class="section-title">Encryption / Decryption (Base64)</h2>
            <label>डेटा एन्क्रिप्ट किंवा डिक्रिप्ट करा:</label>
            <textarea id="crypto-input" rows="4" placeholder="मजकूर किंवा Base64 कोड टाका..."></textarea>
            <div class="btn-group">
                <button class="action-btn" onclick="processCrypto('encode')">Encode to Base64</button>
                <button class="action-btn" onclick="processCrypto('decode')">Decode Base64</button>
            </div>
            <div class="output-box" id="crypto-output">सुरक्षित निकाल इथे दिसेल...</div>
        </div>

        <!-- 3. Smart Calculator Section -->
        <div id="calc-tool" class="tool-section">
            <h2 class="section-title">Smart Calculator</h2>
            <label>गणित टाईप करा (उदा: 25 * 4 + 10):</label>
            <input type="text" id="calc-input" placeholder="Expression टाका आणि Calculate दाबा">
            <div class="btn-group">
                <button class="action-btn" onclick="calculateResult()">Calculate</button>
                <button class="action-btn" onclick="document.getElementById('calc-input').value=''">Clear</button>
            </div>
            <div class="output-box" id="calc-output">उत्तर इथे दिसेल...</div>
        </div>

        <!-- 4. Unit Converter Section -->
        <div id="unit-tool" class="tool-section">
            <h2 class="section-title">Unit Converter (रूपांतरण)</h2>
            <label>व्हॅल्यू टाका:</label>
            <input type="number" id="unit-input" placeholder="संख्या टाका" value="1">
            
            <label>कशातून रूपांतर करायचे:</label>
            <select id="convert-type">
                <option value="km-m">Kilometer (km) to Meter (m)</option>
                <option value="m-km">Meter (m) to Kilometer (km)</option>
                <option value="kg-gm">Kilogram (kg) to Gram (gm)</option>
                <option value="gm-kg">Gram (gm) to Kilogram (kg)</option>
            </select>
            
            <div class="btn-group">
                <button class="action-btn" onclick="convertUnits()">Convert</button>
            </div>
            <div class="output-box" id="unit-output">रूपांतरित निकाल इथे दिसेल...</div>
        </div>

    </div>

    <!-- JavaScript Logic to make everything work -->
    <script>
        // 1. Sidebar Tab Switching Option
        function switchTab(tabId) {
            // सर्व सेक्शन्स लपवा
            document.querySelectorAll('.tool-section').forEach(section => {
                section.classList.remove('active');
            });
            // सर्व बटन्सचे ॲक्टिव्ह स्टेट काढा
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // निवडलेला सेक्शन आणि बटन ॲक्टिव्ह करा
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // 2. Text Utility Functions
        function processText(action) {
            let input = document.getElementById('text-input').value;
            let outputBox = document.getElementById('text-output');

            if (action === 'clear') {
                document.getElementById('text-input').value = '';
                outputBox.innerText = 'निकाल इथे दिसेल...';
                return;
            }

            if (!input.trim()) {
                outputBox.innerText = 'कृपया आधी बॉक्समध्ये काहीतरी टाईप करा!';
                return;
            }

            if (action === 'upper') {
                outputBox.innerText = input.toUpperCase();
            } else if (action === 'lower') {
                outputBox.innerText = input.toLowerCase();
            } else if (action === 'count') {
                let words = input.trim().split(/\s+/).filter(w => w.length > 0).length;
                let chars = input.length;
                outputBox.innerText = `एकूण शब्द (Words): ${words} \nएकूण अक्षरे (Characters): ${chars}`;
            }
        }

        // 3. Crypto Functions
        function processCrypto(action) {
            let input = document.getElementById('crypto-input').value;
            let outputBox = document.getElementById('crypto-output');

            if (!input.trim()) {
                outputBox.innerText = 'कृपया आधी काहीतरी डेटा टाका!';
                return;
            }

            try {
                if (action === 'encode') {
                    outputBox.innerText = btoa(unescape(encodeURIComponent(input)));
                } else if (action === 'decode') {
                    outputBox.innerText = decodeURIComponent(escape(atob(input)));
                }
            } catch (err) {
                outputBox.innerText = "त्रुटी: अवैध Base64 कोड किंवा फॉरमॅट!";
            }
        }

        // 4. Calculator Function
        function calculateResult() {
            let input = document.getElementById('calc-input').value;
            let outputBox = document.getElementById('calc-output');

            if (!input.trim()) {
                outputBox.innerText = 'कृपया गणित टाईप करा!';
                return;
            }

            try {
                // सुरक्षेसाठी फक्त गणिती चिन्हांना परवानगी देणारे साधे eval
                let sanitizedInput = input.replace(/[^0-80-9+\-*/().\s]/g, '');
                let result = Function(`"use strict"; return (${sanitizedInput})`)();
                outputBox.innerText = "उत्तर: " + result;
            } catch (err) {
                outputBox.innerText = "त्रुटी: चुकीचे समीकरण!";
            }
        }

        // 5. Unit Converter Function
        function convertUnits() {
            let val = parseFloat(document.getElementById('unit-input').value);
            let type = document.getElementById('convert-type').value;
            let outputBox = document.getElementById('unit-output');

            if (isNaN(val)) {
                outputBox.innerText = 'कृपया वैध संख्या टाका!';
                return;
            }

            let result = 0;
            switch(type) {
                case 'km-m': result = val * 1000; outputBox.innerText = `${val} km = ${result} meters`; break;
                case 'm-km': result = val / 1000; outputBox.innerText = `${val} meters = ${result} km`; break;
                case 'kg-gm': result = val * 1000; outputBox.innerText = `${val} kg = ${result} grams`; break;
                case 'gm-kg': result = val / 1000; outputBox.innerText = `${val} grams = ${result} kg`; break;
                default: outputBox.innerText = 'काहीतरी अडचण आली आहे!';
            }
        }
    </script>
</body>
            </html>
