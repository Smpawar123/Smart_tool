<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart PDF Tool (PDF24 Clone)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    
    <style>
        :root {
            --primary-color: #2980b9;
            --secondary-color: #2c3e50;
            --success-color: #27ae60;
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 280px;
            background-color: var(--secondary-color);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            color: #ecf0f1;
        }

        .nav-btn {
            background: none;
            border: none;
            color: #bdc3c7;
            padding: 14px 15px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-btn:hover, .nav-btn.active {
            background-color: var(--primary-color);
            color: white;
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .tool-section {
            display: none;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        .tool-section.active {
            display: block;
        }

        h2.section-title {
            color: var(--secondary-color);
            margin-bottom: 25px;
            font-size: 24px;
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
        }

        input[type="file"], input[type="text"], input[type="number"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px dashed #bdc3c7;
            border-radius: 6px;
            background: #fafafa;
            font-size: 15px;
        }

        input[type="file"]:focus, input[type="text"]:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        .action-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn:hover {
            background-color: #1a6696;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .status-success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border-left: 5px solid var(--success-color);
        }

        .status-error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border-left: 5px solid #721c24;
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2><i class="fa-solid fa-file-pdf"></i> PDF24 Smart Tool</h2>
        <button class="nav-btn active" onclick="switchTab('txt-to-pdf')"><i class="fa-solid fa-file-lines"></i> Text to PDF</button>
        <button class="nav-btn" onclick="switchTab('img-to-pdf')"><i class="fa-solid fa-images"></i> Images to PDF</button>
        <button class="nav-btn" onclick="switchTab('merge-pdf')"><i class="fa-solid fa-file-signature"></i> Merge PDF (एकत्र करा)</button>
        <button class="nav-btn" onclick="switchTab('split-pdf')"><i class="fa-solid fa-scissors"></i> Split PDF (अलग करा)</button>
    </div>

    <div class="main-content">

        <div id="txt-to-pdf" class="tool-section active">
            <h2 class="section-title">मजकुरापासून PDF बनवा (Text to PDF)</h2>
            <div class="form-group">
                <label>फाइलचे नाव (File Name):</label>
                <input type="text" id="txt-filename" value="Smart_Document">
            </div>
            <div class="form-group">
                <label>तुमचा मजकूर इथे लिहा:</label>
                <textarea id="txt-content" rows="8" placeholder="काहीतरी टाईप करा..."></textarea>
            </div>
            <button class="action-btn" onclick="convertTextToPdf()"><i class="fa-solid fa-download"></i> PDF डाउनलोड करा</button>
            <div id="status-txt" class="status-box"></div>
        </div>

        <div id="img-to-pdf" class="tool-section">
            <h2 class="section-title">फोटोंची PDF बनवा (Images to PDF)</h2>
            <div class="form-group">
                <label>एक किंवा अनेक फोटो निवडा (JPG/PNG):</label>
                <input type="file" id="img-input" accept="image/*" multiple>
            </div>
            <button class="action-btn" onclick="convertImagesToPdf()"><i class="fa-solid fa-file-pdf"></i> PDF मध्ये रूपांतरित करा</button>
            <div id="status-img" class="status-box"></div>
        </div>

        <div id="merge-pdf" class="tool-section">
            <h2 class="section-title">दोन किंवा अधिक PDF एकत्र करा (Merge PDF)</h2>
            <div class="form-group">
                <label>सर्व PDF फाइल्स एकाच वेळी निवडा:</label>
                <input type="file" id="merge-input" accept="application/pdf" multiple>
            </div>
            <button class="action-btn" onclick="mergePdfFiles()"><i class="fa-solid fa-layer-group"></i> फाइल्स एकत्र करून डाउनलोड करा</button>
            <div id="status-merge" class="status-box"></div>
        </div>

        <div id="split-pdf" class="tool-section">
            <h2 class="section-title">PDF मधील पाने वेगळी करा (Split PDF)</h2>
            <div class="form-group">
                <label>PDF फाइल निवडा:</label>
                <input type="file" id="split-input" accept="application/pdf">
            </div>
            <div class="form-group">
                <label>कोणते पान वेगळे करायचे आहे? (Page Number):</label>
                <input type="number" id="split-page-num" min="1" value="1" style="border: 1px solid #ccc; background:#fff;">
            </div>
            <button class="action-btn" onclick="splitPdfFile()"><i class="fa-solid fa-scissors"></i> ते पान वेगळे करून डाउनलोड करा</button>
            <div id="status-split" class="status-box"></div>
        </div>

    </div>

    <script>
        // Tab Switching Logic
        function switchTab(tabId) {
            document.querySelectorAll('.tool-section').forEach(sec => sec.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
            clearStatus();
        }

        function showStatus(id, msg, isError = false) {
            let box = document.getElementById(id);
            box.innerText = msg;
            box.className = isError ? "status-box status-error" : "status-box status-success";
        }

        function clearStatus() {
            document.querySelectorAll('.status-box').forEach(box => box.style.display = 'none');
        }

        // 1. TEXT TO PDF WORKING LOGIC
        function convertTextToPdf() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                let text = document.getElementById('txt-content').value;
                let filename = document.getElementById('txt-filename').value || "Document";

                if(!text.trim()) {
                    showStatus('status-txt', 'कृपया आधी मजकूर टाईप करा!', true);
                    return;
                }

                doc.text(text, 10, 10);
                doc.save(`${filename}.pdf`);
                showStatus('status-txt', 'PDF यशस्वीरित्या डाऊनलोड झाली!');
            } catch (e) {
                showStatus('status-txt', 'काहीतरी तांत्रिक अडचण आली!', true);
            }
        }

        // 2. IMAGES TO PDF WORKING LOGIC
        function convertImagesToPdf() {
            const files = document.getElementById('img-input').files;
            if (files.length === 0) {
                showStatus('status-img', 'कृपया किमान एक फोटो निवडा!', true);
                return;
            }

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                let loadedImages = 0;
                for (let i = 0; i < files.length; i++) {
                    let reader = new FileReader();
                    reader.onload = function(event) {
                        if (i > 0) doc.addPage();
                        doc.addImage(event.target.result, 'JPEG', 10, 10, 180, 160);
                        loadedImages++;
                        
                        if (loadedImages === files.length) {
                            doc.save('Images_Converted.pdf');
                            showStatus('status-img', 'फोटोंची PDF यशस्वीरित्या तयार झाली!');
                        }
                    };
                    reader.readAsDataURL(files[i]);
                }
            } catch(e) {
                showStatus('status-img', 'फोटो प्रोसेस करताना एरर आला!', true);
            }
        }

        // 3. MERGE PDF WORKING LOGIC
        async function mergePdfFiles() {
            const files = document.getElementById('merge-input').files;
            if (files.length < 2) {
                showStatus('status-merge', 'एकत्र करण्यासाठी किमान २ PDF फाइल्स निवडा!', true);
                return;
            }

            try {
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (let i = 0; i < files.length; i++) {
                    const fileBytes = await files[i].arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(fileBytes);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                const mergedPdfBytes = await mergedPdf.save();
                let blob = new Blob([mergedPdfBytes], { type: "application/pdf" });
                let link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = "Merged_Document.pdf";
                link.click();
                showStatus('status-merge', 'सर्व PDF फाइल्स यशस्वीरित्या एकत्र झाल्या!');
            } catch(e) {
                showStatus('status-merge', 'PDF मर्ज करताना एरर आला. कृपया फाइल्स तपासा!', true);
            }
        }

        // 4. SPLIT PDF WORKING LOGIC
        async function splitPdfFile() {
            const fileInput = document.getElementById('split-input').files[0];
            const pageNum = parseInt(document.getElementById('split-page-num').value);

            if (!fileInput) {
                showStatus('status-split', 'कृपया प्रथम PDF फाइल अपलोड करा!', true);
                return;
            }

            try {
                const fileBytes = await fileInput.arrayBuffer();
                const srcPdf = await PDFLib.PDFDocument.load(fileBytes);
                const totalPages = srcPdf.getPageCount();

                if (pageNum < 1 || pageNum > totalPages) {
                    showStatus('status-split', `या PDF मध्ये फक्त ${totalPages} पाने आहेत. योग्य नंबर टाका!`, true);
                    return;
                }

                const newPdf = await PDFLib.PDFDocument.create();
                const [copiedPage] = await newPdf.copyPages(srcPdf, [pageNum - 1]);
                newPdf.addPage(copiedPage);

                const newPdfBytes = await newPdf.save();
                let blob = new Blob([newPdfBytes], { type: "application/pdf" });
                let link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `Page_${pageNum}_Split.pdf`;
                link.click();
                showStatus('status-split', `पान नंबर ${pageNum} यशस्वीरित्या वेगळे केले आहे!`);
            } catch(e) {
                showStatus('status-split', 'PDF स्प्लिट करताना एरर आला!', true);
            }
        }
    </script>
</body>
    </html>
