<button onclick="speakWord('A for Apple')">A - Apple</button>
<button onclick="speakWord('Two, Four, Six, Eight')">2, 4, 6, 8</button>

<script>
function speakWord(text) {
    // ब्राउझरची इन-बिल्ट व्हॉइस सिस्टीम (Speech Synthesis)
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US'; // मराठीसाठी 'mr-IN' वापरा
    window.speechSynthesis.speak(utterance);
}
</script>
